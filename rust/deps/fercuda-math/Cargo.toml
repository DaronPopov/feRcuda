[package]
name = "fercuda-math"
version = "0.1.0"
edition = "2021"
authors = ["feRcuda Team"]
description = "Core linear algebra facade for feRcuda: nalgebra-first with optional faer and candle interop"
license = "MIT"

[lib]
name = "fercuda_math"
path = "src/lib.rs"

[dependencies]
nalgebra = { version = "0.33", default-features = false, features = ["std"] }
faer = { version = "0.20", optional = true, default-features = false, features = ["std"] }
candle-core = { version = "0.8.4", optional = true, default-features = false }
thiserror = "2.0"

[features]
default = []
faer = ["dep:faer"]
candle = ["dep:candle-core"]
